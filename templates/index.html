<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourseView</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo" id="logo-home" style="cursor:pointer">CourseView</h1>
                <button id="sidebar-close" class="icon-btn mobile-only" aria-label="Close sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <div class="sidebar-search">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search courses, lessons, notes..." autocomplete="off">
            </div>

            <div id="search-results" class="search-results hidden"></div>

            <div id="sidebar-nav" class="sidebar-nav">
                <button class="nav-item active" data-view="dashboard">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </button>
            </div>

            <div id="course-sidebar" class="course-sidebar hidden">
                <div class="course-sidebar-header">
                    <button id="back-to-dashboard" class="nav-item back-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                        All Courses
                    </button>
                    <button id="reorder-btn" class="reorder-btn" title="Reorder lessons">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/><polyline points="7 4 3 6 7 8"/><polyline points="17 10 21 12 17 14"/><polyline points="7 16 3 18 7 20"/></svg>
                    </button>
                </div>
                <div id="reorder-controls" class="reorder-controls hidden">
                    <button id="reorder-save" class="reorder-save-btn">Save Order</button>
                    <button id="reorder-reset" class="reorder-reset-btn">Reset Default</button>
                    <button id="reorder-cancel" class="reorder-cancel-btn">Cancel</button>
                </div>
                <div id="lesson-list" class="lesson-list"></div>
            </div>

            <div class="sidebar-footer">
                <button id="settings-btn" class="footer-settings-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span class="user-label">{{ session.username }}</span>
                </button>
                <form method="POST" action="/logout" class="logout-form">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="icon-btn" title="Sign out">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </form>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <header class="topbar">
                <button id="menu-toggle" class="icon-btn mobile-only" aria-label="Open menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div id="breadcrumb" class="breadcrumb"></div>
                <div class="topbar-actions">
                    <button id="add-course-btn" class="add-course-btn" title="Add course">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
            </header>

            <!-- Dashboard View -->
            <div id="view-dashboard" class="view active">
                <div id="continue-section" class="section hidden">
                    <h2 class="section-title">Recent</h2>
                    <div id="continue-list" class="netflix-row"></div>
                </div>
                <div id="tagged-rows"></div>
                <div class="section">
                    <h2 class="section-title">All Courses</h2>
                    <div id="courses-grid" class="courses-grid"></div>
                </div>
            </div>

            <!-- Player View -->
            <div id="view-player" class="view">
                <div class="player-layout">
                    <div class="player-container">
                        <div class="video-wrapper">
                            <video id="video-player" preload="metadata"></video>
                            <div id="player-overlay" class="player-overlay hidden">
                                <div class="overlay-icon" id="overlay-icon"></div>
                            </div>
                        </div>
                        <div id="document-viewer" class="document-viewer hidden">
                            <iframe id="doc-pdf-iframe" class="doc-pdf-iframe hidden"></iframe>
                            <div id="doc-text-container" class="doc-text-container hidden">
                                <div id="doc-text-content" class="doc-text-content"></div>
                            </div>
                        </div>
                        <div class="player-controls">
                            <div class="progress-bar-container" id="progress-container">
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-buffered" id="buffered-bar"></div>
                                    <div class="progress-bar-fill" id="progress-bar"></div>
                                </div>
                            </div>
                            <div class="controls-row">
                                <div class="controls-left">
                                    <button id="play-btn" class="ctrl-btn" title="Play (Space)">
                                        <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                        <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                                    </button>
                                    <button id="prev-btn" class="ctrl-btn" title="Previous lesson">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="4" x2="5" y2="20" stroke="currentColor" stroke-width="2"/></svg>
                                    </button>
                                    <button id="next-btn" class="ctrl-btn" title="Next lesson">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="4" x2="19" y2="20" stroke="currentColor" stroke-width="2"/></svg>
                                    </button>
                                    <span id="time-display" class="time-display">0:00 / 0:00</span>
                                </div>
                                <div class="controls-right">
                                    <div class="speed-control">
                                        <button id="speed-btn" class="ctrl-btn speed-label">1x</button>
                                        <div id="speed-menu" class="speed-menu hidden">
                                            <button data-speed="1">1x</button>
                                            <button data-speed="1.25">1.25x</button>
                                            <button data-speed="1.5">1.5x</button>
                                            <button data-speed="2">2x</button>
                                        </div>
                                    </div>
                                    <button id="sub-btn" class="ctrl-btn" title="Subtitles">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M7 12h4m-4 3h6m4-3h2m-2 3h2"/></svg>
                                    </button>
                                    <button id="complete-btn" class="ctrl-btn" title="Mark complete">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                                    </button>
                                    <button id="fullscreen-btn" class="ctrl-btn" title="Fullscreen (F)">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div id="lesson-nav-bar" class="lesson-nav-bar hidden">
                            <button id="prev-lesson-btn" class="lesson-nav-btn prev-btn" disabled>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                                <span id="prev-lesson-label">Previous</span>
                            </button>
                            <button id="next-lesson-btn" class="lesson-nav-btn next-btn">
                                <span id="next-lesson-label">Next Lesson</span>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="notes-panel">
                        <div class="notes-header">
                            <h3>Notes</h3>
                        </div>
                        <div id="notes-list" class="notes-list"></div>
                        <div class="notes-input">
                            <textarea id="note-input" placeholder="Add a note at current timestamp..." rows="2"></textarea>
                            <button id="add-note-btn" class="note-submit-btn">Add Note</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Settings View -->
            <div id="view-settings" class="view">
                <div class="settings-container">
                    <!-- Account Section -->
                    <div class="settings-section">
                        <h2 class="settings-section-title">Account</h2>
                        <div class="settings-card">
                            <div class="settings-field">
                                <label>Username</label>
                                <input type="text" id="settings-username" autocomplete="off">
                            </div>
                            <div class="settings-field">
                                <label>Current Password</label>
                                <input type="password" id="settings-current-pw" autocomplete="off" placeholder="Required to save changes">
                            </div>
                            <div class="settings-field">
                                <label>New Password</label>
                                <input type="password" id="settings-new-pw" autocomplete="new-password" placeholder="Leave blank to keep current">
                            </div>
                            <div class="settings-field">
                                <label>Confirm New Password</label>
                                <input type="password" id="settings-confirm-pw" autocomplete="new-password" placeholder="Confirm new password">
                            </div>
                            <div id="account-msg" class="settings-msg hidden"></div>
                            <button id="save-account-btn" class="settings-btn">Save Account</button>
                        </div>
                    </div>

                    <!-- Course Libraries Section -->
                    <div class="settings-section">
                        <h2 class="settings-section-title">Course Libraries</h2>
                        <p class="settings-description">Add folder paths that contain your courses. Each top-level subfolder becomes a course.</p>
                        <div class="settings-card">
                            <div id="libraries-list" class="libraries-list"></div>
                            <div class="library-add-row">
                                <input type="text" id="library-path-input" placeholder="/path/to/courses" autocomplete="off">
                                <input type="text" id="library-label-input" placeholder="Label (optional)" autocomplete="off">
                                <button id="add-library-btn" class="settings-btn-sm">Add</button>
                            </div>
                            <div id="library-msg" class="settings-msg hidden"></div>
                        </div>
                    </div>

                    <!-- Appearance Section -->
                    <div class="settings-section">
                        <h2 class="settings-section-title">Appearance</h2>
                        <div class="settings-card">
                            <div class="settings-field">
                                <label>Theme</label>
                                <div class="theme-options" id="theme-options">
                                    <button class="theme-option active" data-theme="dark">
                                        <span class="theme-swatch" style="background:#0c0c0e"></span>
                                        Dark
                                    </button>
                                    <button class="theme-option" data-theme="dim">
                                        <span class="theme-swatch" style="background:#1a1a20"></span>
                                        Dim
                                    </button>
                                    <button class="theme-option" data-theme="midnight">
                                        <span class="theme-swatch" style="background:#0a0e14"></span>
                                        Midnight
                                    </button>
                                </div>
                            </div>
                            <div class="settings-field">
                                <label>Density</label>
                                <div class="density-options" id="density-options">
                                    <button class="density-option active" data-density="comfortable">Comfortable</button>
                                    <button class="density-option" data-density="compact">Compact</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Playback Section -->
                    <div class="settings-section">
                        <h2 class="settings-section-title">Playback</h2>
                        <div class="settings-card">
                            <div class="settings-field">
                                <label>Default Speed</label>
                                <select id="settings-speed">
                                    <option value="1">1x</option>
                                    <option value="1.25">1.25x</option>
                                    <option value="1.5">1.5x</option>
                                    <option value="2">2x</option>
                                </select>
                            </div>
                            <div class="settings-field settings-toggle-field">
                                <label>Auto-advance to next lesson</label>
                                <button id="auto-advance-toggle" class="toggle-btn active" data-value="true">
                                    <span class="toggle-knob"></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Add Course Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal" class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Course</h2>
                <button id="modal-close" class="icon-btn">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Browse mode -->
                <div id="browse-view">
                    <div id="browse-path" class="browse-path"></div>
                    <div id="browse-list" class="browse-list"></div>
                </div>
                <!-- Tag editor mode -->
                <div id="tag-editor" class="tag-editor hidden">
                    <div class="tag-editor-course-name" id="tag-course-name"></div>
                    <div class="tag-section">
                        <label>Sources</label>
                        <div class="tag-input-row">
                            <input type="text" id="tag-source-input" placeholder="e.g. Masterclass, Udemy..." list="source-suggestions" autocomplete="off">
                            <button id="add-source-btn" class="settings-btn-sm">Add</button>
                        </div>
                        <datalist id="source-suggestions"></datalist>
                        <div id="tag-sources-list" class="tag-pills"></div>
                    </div>
                    <div class="tag-section">
                        <label>Categories</label>
                        <div class="tag-input-row">
                            <input type="text" id="tag-category-input" placeholder="e.g. Cooking, Programming..." list="category-suggestions" autocomplete="off">
                            <button id="add-category-btn" class="settings-btn-sm">Add</button>
                        </div>
                        <datalist id="category-suggestions"></datalist>
                        <div id="tag-categories-list" class="tag-pills"></div>
                    </div>
                    <button id="tag-done-btn" class="settings-btn">Done</button>
                </div>
            </div>
        </div>
    </div>

    <script>window.__CSRF_TOKEN__ = "{{ csrf_token() }}";</script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
